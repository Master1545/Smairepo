openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Smart Board API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: boards
    description: Board operations
  - name: ai
    description: AI operations
  - name: github
    description: GitHub operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /boards:
    get:
      operationId: getBoards
      tags: [boards]
      summary: Get all boards
      responses:
        "200":
          description: List of boards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Board"
    post:
      operationId: createBoard
      tags: [boards]
      summary: Create a new board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoardRequest"
      responses:
        "201":
          description: Created board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"

  /boards/{id}:
    get:
      operationId: getBoard
      tags: [boards]
      summary: Get a board by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Board found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"
        "404":
          description: Board not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateBoard
      tags: [boards]
      summary: Update a board
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBoardRequest"
      responses:
        "200":
          description: Updated board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"
    delete:
      operationId: deleteBoard
      tags: [boards]
      summary: Delete a board
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send a message to AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /ai/explain:
    post:
      operationId: aiExplain
      tags: [ai]
      summary: Ask AI to explain board content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiExplainRequest"
      responses:
        "200":
          description: AI explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /ai/quiz:
    post:
      operationId: aiGenerateQuiz
      tags: [ai]
      summary: Generate quiz from board content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiExplainRequest"
      responses:
        "200":
          description: Generated quiz questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiQuizResponse"

  /github/push:
    post:
      operationId: githubPush
      tags: [github]
      summary: Push board content to GitHub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubPushRequest"
      responses:
        "200":
          description: Push result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubPushResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Board:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
          description: JSON string of board content (canvas elements)
        thumbnail:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - createdAt
        - updatedAt

    CreateBoardRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
          default: "[]"
      required:
        - title

    UpdateBoardRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        thumbnail:
          type: string
          nullable: true

    AiChatRequest:
      type: object
      properties:
        message:
          type: string
        boardContent:
          type: string
          description: Current board content for context
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - message

    AiExplainRequest:
      type: object
      properties:
        boardContent:
          type: string
          description: Board content to explain or generate quiz from
        language:
          type: string
          default: "Turkish"
      required:
        - boardContent

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    AiChatResponse:
      type: object
      properties:
        response:
          type: string
        tokensUsed:
          type: integer
      required:
        - response

    AiQuizResponse:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required:
        - questions

    QuizQuestion:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        explanation:
          type: string
      required:
        - question
        - options
        - correctAnswer
        - explanation

    GitHubPushRequest:
      type: object
      properties:
        token:
          type: string
          description: GitHub Personal Access Token
        owner:
          type: string
        repo:
          type: string
        path:
          type: string
          description: File path in the repository
        content:
          type: string
          description: Content to push
        message:
          type: string
          description: Commit message
        boardId:
          type: integer
      required:
        - token
        - owner
        - repo
        - path
        - content
        - message

    GitHubPushResponse:
      type: object
      properties:
        success:
          type: boolean
        url:
          type: string
        sha:
          type: string
      required:
        - success
        - url
        - sha
